clip_object_capture_session:
  ros__parameters:
    image_topic: /oak/rgb/image_raw/compressed
    image_compressed: true
    camera_info_topic: /oak/rgb/camera_info
    pointcloud_topic: /oak/rgbd/points
    output_root: ~/clip_pose_sessions
    session_name: ''
    sample_prefix: sample

    robot_base_frame: mur620d/UR10_r/base_link
    robot_tcp_frame: mur620d/UR10_r/tool0
    camera_frame: ''
    extra_tf_topics: ''
    extra_tf_static_topics: ''
    use_configured_tcp_to_camera: true
    tcp_to_camera_translation_xyz: 0.0068564203,-0.0892312561,0.1018930213
    tcp_to_camera_quaternion_xyzw: 0.0241307793,-0.0030488269,-0.0062149980,0.9996848423
    planning_frame: mur620d/UR10_r/base_link

    action_name: /mur620d/jparse_move_r
    move_enabled: false
    keyboard_jog_enabled: false
    jog_twist_topic: /mur620d/jparse_velocity_controller_r/twist_cmd
    jog_frame: UR10_r/base_link

    click_window_radius: 4
    click_hole_search_max_radius: 120
    click_hole_search_step: 8
    click_min_points: 8
    click_max_mad_m: 0.02
    click_max_reprojection_error_px: 12.0
    focus_on_click: true
    focus_camera_node: /oak
    focus_infinity_position: 125
    focus_macro_position: 255
    focus_macro_distance_m: 0.08
    fullres_enabled: true
    fullres_required: true
    fullres_hardware_enabled: false
    fullres_camera_node: /oak_fullres_capture
    fullres_capture_service: /oak_fullres_capture/capture
    oak_stop_service: /oak/stop_driver
    oak_start_service: /oak/start_driver
    fullres_width: 8000
    fullres_height: 6000
    fullres_format: jpg
    fullres_jpeg_quality: 97
    fullres_png_compression: 3
    fullres_focus_mode: auto_roi
    fullres_focus_roi_size_px: 800
    roi_default_size_fraction: 0.35
    roi_min_size_px: 24
    fullres_focus_settle_sec: 1.0
    fullres_frame_timeout_sec: 12.0
    capture_pose_max_translation_m: 0.0005
    capture_pose_max_rotation_deg: 0.2
    fullres_allow_fallback: false
    fullres_fallback_width: 4000
    fullres_fallback_height: 3000
    ros_stream_fallback_enabled: true
    ros_stream_min_width: 3840
    ros_stream_min_height: 2160
    ros_stream_format: jpg
    ros_stream_jpeg_quality: 97
    allow_2d_center_fallback: true
    fallback_center_depth_m: 0.45
    samples: 18
    sphere_radius_m: 0.0
    sphere_polar_span_deg: 50.0
    sphere_spiral_turns: 1.25
    camera_look_axis: plus_z
    center_camera_xy_only: true

    target_min_camera_delta_m: 0.04
    target_max_tcp_delta_m: 0.25
    target_max_camera_delta_m: 0.30
    target_max_rotation_deg: 35.0
    max_linear_velocity: 0.025
    max_angular_velocity: 0.10
    move_timeout: 30.0
